<section id="blog" class="bg-sage-50 py-16 md:py-24 scroll-mt-20">
  <div class="max-w-6xl mx-auto px-4 md:px-8">
    <!-- Heading -->
    <div class="text-center mb-12">
      <h2 class="font-display text-3xl md:text-4xl text-sage-900 tracking-display mb-3">{{ i18n "from_journal" }}</h2>
      <p class="text-sage-500 text-lg max-w-md mx-auto">{{ i18n "from_journal_sub" }}</p>
    </div>

    <!-- Post cards -->
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
      {{ range first 3 (where .Site.RegularPages "Section" "blog") }}
      <article class="relative group bg-cream rounded-2xl overflow-hidden shadow-subtle hover:shadow-elevated transition-shadow duration-300">
        {{ with .Params.image }}
        <div class="relative aspect-[16/9] overflow-hidden">
          <img src="{{ . }}" alt="{{ $.Title }}"
               class="w-full h-full object-cover group-hover:scale-[1.03] transition-transform duration-500 ease-out">
          <div class="absolute inset-0 bg-gradient-to-t from-sage-900/20 to-transparent"></div>
          <div class="absolute inset-0 bg-sage-500/5 mix-blend-multiply"></div>
        </div>
        {{ end }}
        <div class="p-5">
          <time class="text-sage-400 text-xs font-medium uppercase tracking-wide">
            {{ time.Format ":date_long" .Date }}
          </time>
          <h3 class="font-display text-lg text-sage-900 mt-2 mb-2 group-hover:text-sage-700 leading-snug">
            <a href="{{ .RelPermalink }}" class="after:absolute after:inset-0">
              {{ .Title }}
            </a>
          </h3>
          <p class="text-sage-500 text-sm leading-relaxed line-clamp-3">
            {{ .Description }}
          </p>
        </div>
      </article>
      {{ end }}
    </div>

    <!-- View all link -->
    <div class="text-center mt-10">
      <a href="{{ "/blog/" | relLangURL }}"
         class="inline-flex items-center gap-2 text-rose-500 font-semibold text-sm hover:text-rose-700
                border-b border-rose-300/50 hover:border-rose-500 pb-0.5">
        {{ i18n "view_all_posts" }}
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5L21 12m0 0l-7.5 7.5M21 12H3"/>
        </svg>
      </a>
    </div>
  </div>
</section>
