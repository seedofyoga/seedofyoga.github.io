{{ $about := index hugo.Data .Site.Language.Lang "about" }}
<section id="about" class="bg-sage-50 py-16 md:py-24 scroll-mt-20">
  <div class="max-w-6xl mx-auto px-4 md:px-8">
    <div class="grid grid-cols-1 md:grid-cols-2 gap-10 md:gap-16 items-center">
      <!-- Photo -->
      <div class="relative">
        <div class="relative rounded-2xl overflow-hidden shadow-floating aspect-[4/5]">
          <img src="{{ $about.photo }}" alt="{{ $about.name }}"
               class="w-full h-full object-cover" loading="lazy">
          <!-- Gradient overlay -->
          <div class="absolute inset-0 bg-gradient-to-t from-sage-900/30 via-transparent to-transparent"></div>
          <!-- Color treatment -->
          <div class="absolute inset-0 bg-sage-500/10 mix-blend-multiply"></div>
        </div>
        <!-- Decorative accent -->
        <div class="absolute -bottom-3 -right-3 w-24 h-24 bg-rose-100/50 rounded-2xl -z-10"></div>
        <div class="absolute -top-3 -left-3 w-16 h-16 bg-gold-100/50 rounded-xl -z-10"></div>
      </div>

      <!-- Content -->
      <div>
        <h2 class="font-display text-3xl md:text-4xl text-sage-900 tracking-display mb-2">{{ $about.name }}</h2>
        <p class="text-rose-500 font-semibold text-sm uppercase tracking-wide mb-4">{{ $about.title }}</p>

        <!-- Certifications -->
        <div class="flex flex-wrap gap-2 mb-6">
          {{ range $about.certifications }}
          <span class="text-xs font-medium px-3 py-1 rounded-full bg-sage-100 text-sage-700 border border-sage-200">
            {{ . }}
          </span>
          {{ end }}
        </div>

        <!-- Bio -->
        <div class="text-sage-700 text-sm leading-body space-y-4">
          {{ $about.bio | markdownify }}
        </div>
      </div>
    </div>
  </div>
</section>
