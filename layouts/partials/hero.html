<section id="hero" class="relative min-h-screen flex items-center justify-center overflow-hidden noise-overlay">
  <!-- Layered radial gradients for depth -->
  <div class="absolute inset-0" style="background:
    radial-gradient(ellipse 80% 60% at 50% 40%, rgba(244,246,242,0.8), transparent),
    radial-gradient(ellipse 60% 50% at 20% 80%, rgba(245,226,222,0.4), transparent),
    radial-gradient(ellipse 50% 40% at 80% 20%, rgba(242,232,213,0.35), transparent),
    linear-gradient(180deg, #FAF8F4 0%, #F4F6F2 100%);
  "></div>

  <!-- Decorative circles -->
  <div class="absolute top-1/4 left-1/4 w-64 h-64 rounded-full bg-sage-100/30 blur-3xl"></div>
  <div class="absolute bottom-1/3 right-1/4 w-48 h-48 rounded-full bg-rose-100/25 blur-3xl"></div>
  <div class="absolute top-1/3 right-1/3 w-32 h-32 rounded-full bg-gold-100/30 blur-2xl"></div>

  <div class="relative z-10 text-center px-4 py-24 md:py-32">
    <!-- Logo -->
    <div class="mb-8 flex justify-center">
      <img src="/images/logo.png" alt="Seed of Yoga — lotus growing from a seed"
           class="w-32 h-auto md:w-48 lg:w-52 drop-shadow-sm"
           style="filter: drop-shadow(0 4px 12px rgba(139,159,130,0.15));">
    </div>

    <!-- Title -->
    <h1 class="font-display text-4xl sm:text-5xl md:text-6xl lg:text-7xl text-sage-900 tracking-display mb-6">
      Seed of Yoga
    </h1>

    <!-- Tagline -->
    <p class="font-body text-lg sm:text-xl md:text-2xl text-sage-700 max-w-xl mx-auto mb-10 leading-body">
      {{ .Site.Params.tagline }}
    </p>

    <!-- CTA -->
    <a href="#schedule"
       class="inline-block bg-rose-500 text-cream font-semibold text-base md:text-lg
              px-8 py-3.5 rounded-full shadow-elevated
              hover:bg-rose-700 hover:shadow-floating
              focus-visible:ring-2 focus-visible:ring-rose-300 focus-visible:ring-offset-2 focus-visible:ring-offset-cream
              active:bg-rose-700 active:scale-[0.97]">
      {{ i18n "view_schedule" }}
    </a>

    <!-- Scroll hint -->
    <div class="mt-16 animate-bounce">
      <svg class="w-6 h-6 mx-auto text-sage-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 13.5L12 21m0 0l-7.5-7.5M12 21V3"/>
      </svg>
    </div>
  </div>
</section>
