<section id="pricing" class="bg-cream py-16 md:py-24 scroll-mt-20">
  <div class="max-w-5xl mx-auto px-4 md:px-8">
    <!-- Heading -->
    <div class="text-center mb-12">
      <h2 class="font-display text-3xl md:text-4xl text-sage-900 tracking-display mb-3">Pricing</h2>
      <p class="text-sage-500 text-lg max-w-md mx-auto">Simple, honest pricing. No hidden fees, no contracts.</p>
    </div>

    <!-- Cards -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 md:gap-5 items-start">
      {{ range .Site.Data.pricing.plans }}
      <div class="relative rounded-2xl p-6 md:p-8 bg-cream
        {{ if .highlighted }}
          border-2 border-rose-500 shadow-floating md:-translate-y-3
        {{ else }}
          border border-sage-200 shadow-elevated
        {{ end }}
        hover:shadow-floating transition-shadow duration-300 ease-out">

        {{ if .highlighted }}
        <div class="absolute -top-3.5 left-1/2 -translate-x-1/2">
          <span class="bg-rose-500 text-cream text-xs font-bold uppercase tracking-wider px-4 py-1.5 rounded-full shadow-subtle">
            Most Popular
          </span>
        </div>
        {{ end }}

        <div class="text-center">
          <h3 class="font-display text-xl text-sage-900 mb-2">{{ .name }}</h3>
          <p class="text-sage-500 text-sm mb-5">{{ .description }}</p>

          <div class="mb-6">
            <span class="font-display text-4xl text-sage-900">{{ .price }}</span>
            <span class="text-sage-400 text-sm ml-1">{{ .period }}</span>
          </div>

          <ul class="text-left space-y-3 mb-8">
            {{ range .features }}
            <li class="flex items-start gap-2.5 text-sage-700 text-sm">
              <svg class="w-4 h-4 mt-0.5 shrink-0 text-sage-500" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
              </svg>
              {{ . }}
            </li>
            {{ end }}
          </ul>

          <a href="#contact"
             class="block w-full text-center py-3 rounded-full font-semibold text-sm
              {{ if .highlighted }}
                bg-rose-500 text-cream shadow-subtle hover:bg-rose-700 hover:shadow-elevated
                active:bg-rose-700
              {{ else }}
                bg-sage-100 text-sage-700 hover:bg-sage-200 hover:text-sage-900
                active:bg-sage-200
              {{ end }}">
            {{ .cta }}
          </a>
        </div>
      </div>
      {{ end }}
    </div>
  </div>
</section>
