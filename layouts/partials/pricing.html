{{ $pricing := index .Site.Data .Site.Language.Lang "pricing" }}
<section id="pricing" class="bg-cream py-16 md:py-24 scroll-mt-20">
  <div class="max-w-5xl mx-auto px-4 md:px-8">
    <!-- Heading -->
    <div class="text-center mb-12">
      <h2 class="font-display text-3xl md:text-4xl text-sage-900 tracking-display mb-3">{{ i18n "pricing" }}</h2>
      <p class="text-sage-500 text-lg max-w-md mx-auto">{{ i18n "pricing_sub" }}</p>
    </div>

    <!-- Cards -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 md:gap-5 items-start">
      {{ range $pricing.plans }}
      <div class="relative rounded-2xl p-6 md:p-8 bg-cream border border-sage-200 shadow-elevated
        hover:shadow-floating transition-shadow duration-300 ease-out">

        <div class="text-center">
          <h3 class="font-display text-xl text-sage-900 mb-2">{{ .name }}</h3>
          <p class="text-sage-500 text-sm mb-5">{{ .description }}</p>

          <div class="mb-6">
            <span class="font-display text-4xl text-sage-900">{{ .price }}</span>
            <span class="text-sage-400 text-sm ml-1">{{ .period }}</span>
          </div>

          <ul class="text-left space-y-3 mb-8">
            {{ range .features }}
            <li class="flex items-start gap-2.5 text-sage-700 text-sm">
              <svg class="w-4 h-4 mt-0.5 shrink-0 text-sage-500" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
              </svg>
              {{ . }}
            </li>
            {{ end }}
          </ul>

          <a href="#contact"
             class="block w-full text-center py-3 rounded-full font-semibold text-sm
              bg-sage-100 text-sage-700 hover:bg-sage-200 hover:text-sage-900 active:bg-sage-200">
            {{ .cta }}
          </a>
        </div>
      </div>
      {{ end }}
    </div>
  </div>
</section>
