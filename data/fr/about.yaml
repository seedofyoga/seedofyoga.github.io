bio: |
  Mon parcours de yoga a commencé en 2015 lorsque j'ai commencé à pratiquer le Hatha yoga à Exeter, au Royaume-Uni.
  En 2023, j'ai finalement décidé de me lancer et de devenir enseignant, 
  en complétant ma formation RYS 200 à SoShanti Yoga School à Dharamshala, en Inde. 
  J'ai également suivi un cours d'immersion au Himalayan Iyengar Yoga Centre, 
  et je pratique la méditation Vipassana depuis plusieurs années.
  
  Mon style d'enseignement est un mélange de Hatha traditionnel et de Vinyasa. Je vise à créer un espace accueillant et de soutien pour les étudiants de tous niveaux,
  les guidant dans leur pratique. Je suis également passionné par le trekking, la permaculture, et le bien-être mental et physique.
  
  À bientôt sur le tapis !
