# quote: "Le yoga, ce n'est pas toucher ses orteils — c'est ce que vous apprenez en chemin."
bio: |
  Forte de plus de 15 ans de pratique et d'enseignement, Sarah a fondé Seed of Yoga
  avec une conviction simple : chaque personne porte en elle la graine de la transformation.

  Son enseignement mêle le Hatha et le Vinyasa traditionnels à des pratiques de pleine conscience,
  créant un espace où les élèves de tous niveaux se sentent accueillis et stimulés.
  Sarah s'est formée au Krishnamacharya Yoga Mandiram à Chennai, en Inde, et continue
  de se perfectionner chaque année auprès d'enseignants expérimentés.

  Quand elle n'est pas sur le tapis, vous la trouverez en train de jardiner, de lire de la poésie
  ou d'explorer les sentiers de randonnée avec son chien, Bodhi.
