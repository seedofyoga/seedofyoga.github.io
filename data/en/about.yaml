bio: |
  My yoga journey began in 2015 when I started practicing Hatha yoga at Exeter, UK.
  In 2023, I finally decided to take the plunge and become a teacher, 
  completing my RYS 200 training at SoShanti Yoga School in Dharamshala, India. 
  I also received an Immersion Course at the Himalayan Iyengar Yoga Centre, 
  and have been practicing Vipassana meditation for several years.
  
  My teaching style is a blend of traditional Hatha and Vinyasa. I aim to create a welcoming and supportive space for students of all levels,
  guiding them in their practice. I'm also passionate about trekking, sustainable living (permaculture), and mental and physical wellbeing.
  
  See you on the mat soon !
