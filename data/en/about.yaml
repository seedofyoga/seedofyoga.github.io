# quote: "Yoga is not about touching your toes — it's about what you learn on the way down."
bio: |
  With over 15 years of dedicated practice and teaching, Sarah founded Seed of Yoga
  with a simple belief: that every person carries within them the seed of transformation.

  Her teaching weaves together traditional Hatha and Vinyasa with mindfulness practices,
  creating a space where students of all levels feel welcomed and challenged.
  Sarah trained at the Krishnamacharya Yoga Mandiram in Chennai, India, and continues
  to study with senior teachers annually.

  When she's not on the mat, you'll find her tending to her garden, reading poetry,
  or exploring local hiking trails with her rescue dog, Bodhi.
